# Upsun configuration, generated using AI at: 2026-04-04T18:44:28+02:00
# AI can make mistakes. Please modify this file to suit your needs.
applications:
  measyai-next:
    type: nodejs:24

    build:
      flavor: none

    hooks:
      build: |
        set -ex
        bun install
        bun run build
        mv .next .next-built

      deploy: |
        set -ex
        touch .next/build-tree-id
        if [ "$(< .next/build-tree-id)" != "$PLATFORM_TREE_ID" ]; then
          cp -Rs $PWD/.next-built/* .next
          echo -n "$PLATFORM_TREE_ID" > .next/build-tree-id
        fi

    web:
      commands:
        pre_start: |
          touch .next/build-tree-id
          if [ "$(< .next/build-tree-id)" != "$PLATFORM_TREE_ID" ]; then
            echo >&2 "Waiting for deployment to complete"
            while [ "$(< .next/build-tree-id)" != "$PLATFORM_TREE_ID" ]; do sleep 1; done
          fi
        start: bun run start -p "$PORT"

      locations:
        /:
          root: public
          passthru: true
          expires: 1h
          scripts: false

    variables:
      env:
        NEXT_TELEMETRY_DISABLED: '1'

    mounts:
      .next:
        source: storage

    relationships:
      turso: {}

services:
  turso:
    type: network-storage:1.0

routes:
  https://{default}/:
    type: upstream
    upstream: measyai-next:http
    cache:
      enabled: true