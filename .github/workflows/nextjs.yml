name: Build & Deploy Next.js (Self-Hosted)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Add pm2
        run: bun -g install pm2
      
      - name: Install dependencies
        run: bun install

      - name: Build Next.js app
        run: bun run build

      - name: Restart app with PM2
        run: |
          pm2 delete next-app || true
          pm2 start "bun run start --port 6767" --name next-app
          pm2 save
